{% extends "app/layout.html" %} {% block head %}
<title>Log in</title>
{% endblock %} {% block content %}
<div class="login-container">
    <h1>Log in</h1>
    <form method="post">
        {% csrf_token %} {{ form }}
        <button type="submit" class="button">Log in</button>
    </form>
    <a href="{% url 'password_reset' %}" class="button-link">Forgot password?</a>
    <a href="{% url 'register' %}" class="button-link">Sign up</a>
</div>
{% endblock %}
